<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartWeather Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
      <span class="navbar-brand mb-0 h1">SmartWeather Dashboard</span>
    </div>
  </nav>

  <main class="container my-4">
    <div class="row g-4">
      
      <aside class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-3">Search City</h2>

            <form id="search-form">
              <div class="mb-3">
                <input
                  type="text"
                  id="city-input"
                  class="form-control"
                  placeholder="Enter city name"
                />
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-2">
                Search Weather
              </button>
            </form>

            <button id="clear-history" class="btn btn-outline-danger btn-sm w-100">
              Clear History
            </button>

            <hr />

            <h3 class="h5">Recent Searches</h3>
            <div id="history-list" class="d-grid gap-2 mt-3"></div>
          </div>
        </div>
      </aside>

      <section class="col-lg-8">
        <div id="current-weather" class="card shadow-sm mb-4 d-none">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start flex-wrap">
              <div>
                <h2 class="h3 mb-3" id="city-name">Current Weather</h2>
                <p><strong>Coordinates:</strong> <span id="coords"></span></p>
                <p><strong>Temperature:</strong> <span id="temp"></span></p>
                <p><strong>Humidity:</strong> <span id="humidity"></span></p>
                <p><strong>Wind Speed:</strong> <span id="wind"></span></p>
                <p><strong>Condition:</strong> <span id="condition"></span></p>
              </div>
              <div class="text-center">
                <img id="weather-icon" src="" alt="Weather Icon" class="weather-icon" />
              </div>
            </div>

            <button id="toggle-unit" class="btn btn-outline-secondary btn-sm mt-3">
              Switch to °C
            </button>
          </div>
        </div>

        <div id="forecast-section" class="d-none">
          <h2 class="h4 mb-3">5-Day Forecast</h2>
          <div id="forecast-container" class="row g-3"></div>
        </div>
      </section>
    </div>
  </main>

  <div
    class="modal fade"
    id="errorModal"
    tabindex="-1"
    aria-labelledby="errorModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="errorModalLabel">Search Error</h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body" id="modal-message">
          Something went wrong.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
